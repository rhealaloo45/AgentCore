agent_name: google-workspace-agent

system_prompt_file: prompts/system.txt

model:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  temperature: 0.2

# Built in code via GoogleWorkspaceConnector (service account + domain-wide delegation).
connectors:
  google_workspace:
    credentials_file: ${GOOGLE_SA_KEY_FILE}
    subject: ${GOOGLE_SUBJECT}

memory:
  conversation:
    enabled: true
    window_size: 10

middleware:
  retry:
    max_attempts: 3
  rate_limiter:
    rpm: 60
  cost_tracking:
    enabled: true
  audit:
    enabled: true
  human_approval:
    require_approval_for: ["send_email", "create_event", "create_task"]

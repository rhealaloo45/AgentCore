agent_name: exec-assistant-agent

system_prompt_file: prompts/system.txt

model:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  temperature: 0.2

# Built in code via OutlookConnector (Microsoft Graph, client-credentials).
connectors:
  outlook:
    client_id: ${MS_CLIENT_ID}
    client_secret: ${MS_CLIENT_SECRET}
    tenant_id: ${MS_TENANT_ID}
    mailbox: ${MS_MAILBOX}

memory:
  conversation:
    enabled: true
    window_size: 10

middleware:
  retry:
    max_attempts: 3
  rate_limiter:
    rpm: 60
  cost_tracking:
    enabled: true
  audit:
    enabled: true
  human_approval:
    require_approval_for: ["send_email", "create_calendar_event"]
